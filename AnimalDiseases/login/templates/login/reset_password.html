<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{% static 'login/css/email_and_reset_pass_animal.css' %}"/>
</head>
<body>
    {% if messages %}
        {% for mess in messages %}
            <h5>{{ mess }}</h5>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <p>New password:</p>
        <input type="text" name="password"/>
        <p>Repeat new password:</p>
        <input type="text" name="repeat"/>
        <button type="submit">Change</button>
    </form>
    <button type="button"><a href="{% url 'email_form' %}">Back</a></button>
    <br>
</body>
</html>
